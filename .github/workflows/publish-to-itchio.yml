on:
  release:
    types: [published]

jobs:
  setup_job:
    runs-on: ubuntu-latest
    # Map a step output to a job output
    outputs:
      versionNumber: ${{ steps.step1.outputs.test }}
    steps:
    - id: step1
      run: |
        echo "test=$(curl -H 'Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}' --location 'https://api.github.com/repos/dfebs/breakout-clone/releases/latest' | jq -r .name)" >> $GITHUB_OUTPUT
  release_html:
    runs-on: ubuntu-latest
    needs: setup_job
    steps:
      - name: download HTML5
        id: download-html
        uses: dsaltares/fetch-gh-release-asset@master
        with:
          file: Web.zip
          token: ${{ secrets.GITHUB_TOKEN }}
          version: "tags/${{needs.setup_job.outputs.versionNumber}}"
      - name: deploy to itch.io (HTML5)
        uses: yeslayla/butler-publish-itchio-action@master
        env:
          BUTLER_CREDENTIALS: ${{ secrets.BUTLER_CREDENTIALS }}
          CHANNEL: html
          ITCH_GAME: breakout-clone
          ITCH_USER: dfebs
          PACKAGE: Web.zip
          VERSION: ${{ steps.download-html.outputs.version }}
